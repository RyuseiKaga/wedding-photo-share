<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Wedding Photo Share</title>

  <link
    rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%93%B7%3C/text%3E%3C/svg%3E"
  />

  <link rel="preconnect" href="https://res.cloudinary.com" crossorigin>
  <link rel="preconnect" href="https://api.cloudinary.com" crossorigin>

  <link rel="stylesheet" href="css/style.css?v=95" />
</head>

<body>
  <header class="header">
    <svg class="header-ornament" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 22" fill="none" aria-hidden="true">
      <line x1="0" y1="11" x2="62" y2="11" stroke="rgba(47,111,94,.22)" stroke-width="0.8"/>
      <line x1="98" y1="11" x2="160" y2="11" stroke="rgba(47,111,94,.22)" stroke-width="0.8"/>
      <circle cx="66" cy="11" r="1.6" fill="rgba(47,111,94,.28)"/>
      <rect x="73" y="4" width="14" height="14" rx="0" transform="rotate(45 80 11)" fill="none" stroke="rgba(47,111,94,.42)" stroke-width="1.2"/>
      <circle cx="80" cy="11" r="2.2" fill="rgba(47,111,94,.18)"/>
      <circle cx="94" cy="11" r="1.6" fill="rgba(47,111,94,.28)"/>
    </svg>
    <h1>写真をシェアしよう</h1>
    <p>チェックで選択 → 一括保存</p>
    <p id="photoCount" class="photo-count"></p>
  </header>

  <main>
    <section class="upload">
      <label class="upload-button">
        写真をアップロード
        <input id="fileInput" type="file" accept="image/*" multiple hidden />
      </label>
    </section>

    <div class="sort-bar">
      <button id="summaryBtn" class="summary-open-btn" type="button" hidden>今日の思い出</button>
      <button id="sortToggle" class="sort-toggle-btn" type="button">時系列で見る</button>
    </div>

    <section class="gallery" id="gallery"></section>
    <div id="galleryEmpty" class="gallery-empty" hidden>
      <div class="gallery-empty-icon" aria-hidden="true"></div>
      <p class="gallery-empty-title">写真がまだありません</p>
      <p class="gallery-empty-sub">「写真をアップロード」から最初の1枚を追加しましょう</p>
    </div>
    <div id="sentinel" style="height:1px;"></div>
  </main>

  <div id="bulkBar" class="bulkbar" hidden>
    <div class="bulkbar-left">
      <div class="bulkbar-count">
        選択: <span id="selectedCount">0</span> 枚
      </div>
      <button id="clearSelection" class="bulkbar-link" type="button">選択解除</button>
    </div>
    <div class="bulkbar-right">
      <button id="bulkDelete" class="bulkbar-btn danger" type="button">
        削除
      </button>
      <button id="bulkSave" class="bulkbar-btn primary" type="button">
        一括保存（カメラロール）
      </button>
    </div>
  </div>

  <!-- ✨ Opening intro animation -->
  <div id="introOverlay" class="intro-overlay" aria-hidden="true">
    <div class="intro-content">
      <div class="intro-rings-wrap">
        <div class="intro-ring-l"></div>
        <div class="intro-ring-r"></div>
      </div>
      <div class="intro-title">Wedding Photo Share</div>
      <div class="intro-divider"></div>
      <div class="intro-sub">思い出をみんなでシェアしよう</div>
    </div>
    <div class="intro-hint">タップしてスキップ</div>
  </div>

  <div id="uploadOverlay" class="overlay" hidden>
    <div class="overlay-card" role="status" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
      <div class="spinner-pulse" aria-hidden="true"></div>

      <div id="uploadOverlayTitle" class="overlay-title">処理中…</div>
      <div id="uploadOverlaySub" class="overlay-sub">しばらくお待ちください</div>
      <div id="uploadOverlayProgress" class="overlay-progress"></div>
    </div>
  </div>

  <!-- ✅ hidden ではなく class で制御する（初期は is-open なし = 非表示） -->
  <div id="viewer" class="viewer" aria-hidden="true">
    <div class="viewer-backdrop" aria-hidden="true"></div>

    <div class="viewer-sheet" role="dialog" aria-modal="true">
      <button id="viewerClose" class="viewer-close" type="button" aria-label="閉じる">✕</button>

      <div class="viewer-media">
        <img id="viewerImg" alt="preview" />
        <div id="viewerLoading" class="viewer-loading" hidden>
          <div class="spinner small" aria-hidden="true"></div>
          <div class="viewer-loading-text">高画質を読み込み中…</div>
        </div>
      </div>


    </div>
  </div>

  <!-- ✨ Summary modal (post-wedding) -->
  <div id="summaryModal" class="smry-modal" hidden aria-modal="true" role="dialog" aria-label="今日の思い出">
    <div class="smry-backdrop" id="summaryBackdrop"></div>
    <div class="smry-sheet">

      <button class="smry-close" id="summaryClose" type="button" aria-label="閉じる">✕</button>

      <div class="smry-scroll">
        <!-- Header -->
        <div class="smry-head">
          <svg class="smry-ornament" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 22" fill="none" aria-hidden="true">
            <line x1="0" y1="11" x2="62" y2="11" stroke="rgba(180,150,80,.35)" stroke-width="0.8"/>
            <line x1="98" y1="11" x2="160" y2="11" stroke="rgba(180,150,80,.35)" stroke-width="0.8"/>
            <circle cx="66" cy="11" r="1.6" fill="rgba(180,150,80,.45)"/>
            <rect x="73" y="4" width="14" height="14" transform="rotate(45 80 11)" fill="none" stroke="rgba(180,150,80,.60)" stroke-width="1.2"/>
            <circle cx="80" cy="11" r="2.2" fill="rgba(180,150,80,.25)"/>
            <circle cx="94" cy="11" r="1.6" fill="rgba(180,150,80,.45)"/>
          </svg>
          <h2 class="smry-heading">今日の思い出</h2>
          <p class="smry-date-label">2026.04.11</p>
        </div>

        <!-- Top 5 photos -->
        <section class="smry-section">
          <div class="smry-section-head">
            <span class="smry-section-line"></span>
            <span class="smry-section-label">思い出の写真</span>
            <span class="smry-section-line"></span>
          </div>
          <div id="smryPhotos" class="smry-photos"></div>
        </section>

        <!-- Songs -->
        <section class="smry-section">
          <div class="smry-section-head">
            <span class="smry-section-line"></span>
            <span class="smry-section-label">当日の選曲</span>
            <span class="smry-section-line"></span>
          </div>
          <div id="smryTracks" class="smry-tracks"></div>
          <div class="smry-attr-row">
            <a class="smry-spotify-attr" href="https://open.spotify.com/playlist/3ozr8TqGngu8Rh4yBPq1dZ" target="_blank" rel="noopener">
              <svg class="smry-spotify-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-label="Spotify" role="img">
                <path fill="#1DB954" d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
              </svg>
              <span>Spotifyで開く</span>
            </a>
            <a class="smry-apple-attr" href="https://music.apple.com/jp/playlist/4-11-%E7%B5%90%E5%A9%9A%E5%BC%8F/pl.u-KVXBqm3uoBJrL3" target="_blank" rel="noopener">
              <svg class="smry-spotify-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-label="Apple Music" role="img">
                <circle cx="12" cy="12" r="10" fill="#FA2D48"/>
                <text x="12" y="16.5" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="-apple-system, BlinkMacSystemFont, sans-serif">♫</text>
              </svg>
              <span>Apple Musicで開く</span>
            </a>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script defer src="js/main.js?v=106"></script>
</body>
</html>
